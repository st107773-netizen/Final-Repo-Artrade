version: "3.9"

services:
  db:
    image: postgres:16
    container_name: sla_db
    environment:
      POSTGRES_DB: sla
      POSTGRES_USER: sla
      POSTGRES_PASSWORD: sla
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sla -d sla"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: sla_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://sla:sla@db:5432/sla
      NORMS_PATH: /app/config/norms.yml
      EXCLUDE_LIFECYCLE_INCOMPLETE: "true"
      EXCLUDE_OUTCOME_UNKNOWN: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
